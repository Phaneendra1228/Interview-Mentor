<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Interview Mentor</title>
    <script>
      window.onerror = function(msg, source, lineno, colno, error) {
        document.body.innerHTML = '<div style="color: white; padding: 20px; font-family: monospace; z-index: 9999; position: relative;"><h1>APP CRASHED</h1><p>' + msg + '</p><pre>' + (error ? error.stack : '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="color: white; padding: 20px; font-family: monospace; z-index: 9999; position: relative;"><h1>PROMISE CRASHED</h1><p>' + (event.reason ? event.reason.stack || event.reason : event) + '</p></div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
